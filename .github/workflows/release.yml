name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Publish exe (expanded, self-contained)
        run: >-
          dotnet publish aurora.csproj -c Release -r win-x64
          --self-contained true
          -p:PublishReadyToRun=true
          -p:SatelliteResourceLanguages=zh-Hans
          -o publish

      # 可选数字签名（门控）：GitHub secrets 设置 AURORA_CERT_PFX_B64（PFX 的 base64）+ AURORA_CERT_PASS 后生效。
      # 未设置则跳过，产物未签名（SmartScreen 会警告）。exe 须在 harvest 前签名，使 MSI 内嵌已签 exe。
      - name: Sign exe (if cert present)
        shell: pwsh
        env:
          CERT_PFX_B64: ${{ secrets.AURORA_CERT_PFX_B64 }}
          CERT_PASS: ${{ secrets.AURORA_CERT_PASS }}
        run: |
          if (-not $env:CERT_PFX_B64) { Write-Host "No AURORA_CERT_PFX_B64 secret — skipping exe signing"; exit 0 }
          $pfx = Join-Path $env:TEMP "aurora-cert.pfx"
          [System.IO.File]::WriteAllBytes($pfx, [System.Convert]::FromBase64String($env:CERT_PFX_B64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw "signtool not found on runner (Windows SDK missing?)" }
          & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $pfx /p $env:CERT_PASS publish/aurora.exe
          if ($LASTEXITCODE -ne 0) { throw "exe signing failed" }
          Remove-Item $pfx -Force
          Write-Host "Signed publish/aurora.exe"

      - name: Install WiX v4 + UI extension
        shell: pwsh
        run: |
          dotnet tool install -g wix --version 4.0.5
          wix extension add WixToolset.UI.wixext/4.0.5

      - name: Harvest publish directory
        shell: pwsh
        run: |
          $publishDir = "publish"
          $rootPath = (Resolve-Path $publishDir).Path
          $files = Get-ChildItem $publishDir -Recurse -File
          $subdirs = @()
          foreach ($f in $files) {
              $relDir = $f.DirectoryName.Substring($rootPath.Length).TrimStart('\','/')
              if ($relDir -and $subdirs -notcontains $relDir) { $subdirs += $relDir }
          }
          $dirIds = @{ "" = "INSTALLFOLDER" }
          foreach ($sd in $subdirs) { $dirIds[$sd] = "d_" + ($sd -replace '[^a-zA-Z0-9]','_') }
          $wxs = "<?xml version=""1.0"" encoding=""UTF-8""?>`n<Wix xmlns=""http://wixtoolset.org/schemas/v4/wxs"">`n  <Fragment>`n    <DirectoryRef Id=""INSTALLFOLDER"">`n"
          foreach ($sd in $subdirs) {
              $name = Split-Path $sd -Leaf
              $wxs += "      <Directory Id=""$($dirIds[$sd])"" Name=""$name"" />`n"
          }
          $wxs += "    </DirectoryRef>`n    <ComponentGroup Id=""HarvestComponents"" Directory=""INSTALLFOLDER"">`n"
          $i = 0
          foreach ($f in $files) {
              $rel = $f.FullName.Substring($rootPath.Length + 1).Replace('\','/')
              $relDir = $f.DirectoryName.Substring($rootPath.Length).TrimStart('\','/')
              $fileId = "f$i"
              $dirAttr = if ($relDir) { " Directory=""$($dirIds[$relDir])""" } else { "" }
              $wxs += "      <Component Guid=""*""$dirAttr>`n        <File Id=""$fileId"" Source=""`$(var.PublishDir)$rel"" KeyPath=""yes"" />`n      </Component>`n"
              $i++
          }
          $wxs += "    </ComponentGroup>`n  </Fragment>`n</Wix>"
          $wxs | Out-File "installer/harvest.wxs" -Encoding UTF8
          Write-Host "Harvested $i files"

      - name: Build MSI
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($v) -or $v -eq '${{ github.ref_name }}') { $v = "0.0.0" }
          Write-Host "Version: $v"
          wix build installer/aurora.wxs installer/harvest.wxs -o "publish/aurora-$v.msi" -d "Version=$v" -d "PublishDir=$PWD/publish/" -ext WixToolset.UI.wixext
          if (-not (Test-Path "publish/aurora-$v.msi")) { throw "MSI build failed" }
          $h = (Get-FileHash "publish/aurora-$v.msi" -Algorithm SHA256).Hash
          "$h  aurora-$v.msi" | Out-File "publish/aurora-$v.msi.sha256" -Encoding ascii
          Write-Host "SHA256: $h"

      - name: Sign MSI (if cert present)
        shell: pwsh
        env:
          CERT_PFX_B64: ${{ secrets.AURORA_CERT_PFX_B64 }}
          CERT_PASS: ${{ secrets.AURORA_CERT_PASS }}
        run: |
          if (-not $env:CERT_PFX_B64) { Write-Host "No cert — skipping MSI signing"; exit 0 }
          $v = "${{ github.ref_name }}".TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($v) -or $v -eq '${{ github.ref_name }}') { $v = "0.0.0" }
          $msi = "publish/aurora-$v.msi"
          $pfx = Join-Path $env:TEMP "aurora-cert.pfx"
          [System.IO.File]::WriteAllBytes($pfx, [System.Convert]::FromBase64String($env:CERT_PFX_B64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $pfx /p $env:CERT_PASS $msi
          if ($LASTEXITCODE -ne 0) { throw "MSI signing failed" }
          Remove-Item $pfx -Force
          Write-Host "Signed $msi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-msi
          path: publish/*.msi*

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/*.msi
            publish/*.msi.sha256
